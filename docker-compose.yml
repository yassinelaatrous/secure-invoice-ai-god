services:
  # Application Secure Invoice AI (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-invoice-ai
    ports:
      - "8000:8000"
    volumes:
      # Montage du dossier local pour utiliser le code à jour
      - ./backend:/app/backend
    environment:
      - JWT_SECRET_KEY=secure-invoice-ai-secret-key-change-in-production
      - ENVIRONMENT=production
    restart: unless-stopped

services:
  # Application Secure Invoice AI (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-invoice-ai
    ports:
      - "8000:8000"
    volumes:
      # Persister uniquement les uploads et la base de donnees
      - uploads_data:/app/backend/uploads
    environment:
      - JWT_SECRET_KEY=secure-invoice-ai-secret-key-change-in-production
      - ENVIRONMENT=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped

volumes:
  uploads_data:
    driver: local
